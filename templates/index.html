<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Gym — 训练计划管理</title>
  <meta name="description" content="管理你的训练计划，一键生成带语音提示的训练音频" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="layout">

  <!-- ===== 顶部栏 ===== -->
  <header>
    <span class="logo-icon">🏋️</span>
    <span class="logo">Smart Gym</span>
    <span class="subtitle">训练计划 · 语音提示</span>
  </header>

  <!-- ===== 侧边栏：计划列表 ===== -->
  <aside id="sidebar">
    <div class="sidebar-label">导航</div>
    <a class="plan-item active" href="/" style="text-decoration:none;color:inherit;" id="nav-plans">
      <span class="plan-icon">📋</span>
      <span class="plan-name">训练计划</span>
    </a>
    <a class="plan-item" href="/how-to" style="text-decoration:none;color:inherit;">
      <span class="plan-icon">📖</span>
      <span class="plan-name">使用说明</span>
    </a>
    <div class="sidebar-label" style="margin-top:12px;">我的计划</div>
    <div id="plan-list">
      <!-- 由 JS 动态渲染 -->
    </div>
    <button class="btn-new-plan" id="btn-new-plan">
      <span>＋</span> 新建计划
    </button>
  </aside>

  <!-- ===== 主内容区 ===== -->
  <main id="main-content">
    <!-- 空状态 -->
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">📋</div>
      <h2>还没有训练计划</h2>
      <p>点击左侧「新建计划」开始吧</p>
    </div>

    <!-- 计划编辑器（选中/新建计划时显示） -->
    <div class="plan-editor" id="plan-editor" style="display:none;">

      <!-- 标题 + 操作按钮 -->
      <div class="plan-header">
        <input
          type="text"
          class="plan-title-input"
          id="plan-title"
          placeholder="输入训练计划名称…"
          maxlength="60"
        />
        <div class="btn-group">
          <button class="btn btn-danger btn-sm" id="btn-delete-plan" title="删除此计划">
            🗑 删除
          </button>
          <button class="btn btn-primary" id="btn-save-plan">
            <span class="btn-icon">💾</span>
            <span class="spinner"></span>
            保存
          </button>
        </div>
      </div>

      <!-- 动作列表 -->
      <div class="exercises-container">
        <div class="section-header">
          <span class="section-title">动作列表</span>
          <span class="badge badge-success" id="exercise-count">0 个动作</span>
        </div>
        <div id="exercise-list">
          <!-- 由 JS 动态渲染 -->
        </div>
        <button class="btn btn-add" id="btn-add-exercise">
          ＋ 添加动作
        </button>
      </div>

      <!-- 操作面板（音频与报告） -->
      <div class="action-panels">
        <!-- 音频区 -->
        <div class="audio-panel" id="audio-panel">
          <div class="audio-info">
            <h3>🎵 训练语音音频</h3>
            <p id="audio-desc">点击生成后，可在页面内直接播放</p>
          </div>
          <button class="btn btn-ghost" id="btn-gen-audio">
            <span class="btn-icon">⚡</span>
            <span class="spinner"></span>
            生成音频
          </button>
          <audio id="audio-player" controls style="display:none;"></audio>
        </div>

        <!-- 总结报告区 -->
        <div class="report-panel">
          <div class="audio-info">
            <h3>📝 训练总结报告</h3>
            <p>训练完成后，给动作打分并记录难点，生成复盘 MD 报告。</p>
          </div>
          <button class="btn btn-secondary" id="btn-open-report">
            撰写报告…
          </button>
        </div>
      </div>

    </div>
  </main>

</div>

<!-- Toast 容器 -->
<div class="toast-container" id="toast-container"></div>

<!-- 报告 Modal -->
<div class="modal-overlay" id="report-modal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <h2>训练复盘报告</h2>
      <button class="btn-close" id="btn-close-report">✕</button>
    </div>
    <div class="modal-body">
      <div id="report-exercise-list">
        <!-- JS 动态渲染打分列表 -->
      </div>
      <div class="report-notes">
        <label>总体备注 / 感受</label>
        <textarea id="report-notes" rows="3" placeholder="写下今天的训练感受…"></textarea>
      </div>
      <div id="report-result-area" style="display:none; margin-top: 16px;">
        <label>报告已生成并在本地保存。Markdown 内容预览：</label>
        <textarea id="report-md-preview" rows="8" readonly style="font-family: monospace; font-size: 0.8rem;"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="btn-cancel-report">取消</button>
      <button class="btn btn-primary" id="btn-submit-report">
        <span class="spinner"></span> 提交并生成
      </button>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
